name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: warning

      - name: Validate shell syntax
        run: |
          sh -n scripts/download_jar.sh
          sh -n scripts/start_server.sh
          bash -n build.sh
          bash -n update_version.sh
          bash -n examples/run-minecraft-server.sh
          bash -n examples/run-proxy-server.sh

      - name: Build Docker image
        run: docker build --pull --build-arg UID=10001 --build-arg GID=10001 -t mcserver:test .
